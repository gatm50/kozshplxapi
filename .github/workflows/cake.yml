name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-pack:
    runs-on: ubuntu-latest
    env:
      finaltarget: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'PublishNuGet' || 'Pack' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run Cake Pipeline
        run: dotnet run ci-pipeline.cs -- --target ${{ env.finaltarget }} --configuration Release --nugetApiKey "${{ secrets.KOZSH_NUGET_API_KEY }}"
